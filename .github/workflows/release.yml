name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build module zip
        run: |
          zip -r module.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "module.zip" \
            -x "*.zip"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            module.json module.zip \
            --clobber
